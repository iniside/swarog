# Architecture rules for the modular monolith — the same boundaries we enforce conceptually,
# now machine-checked in CI. Run: go-arch-lint check
#
# The point: a module's IMPLEMENTATION is private. Cross-module communication goes only through
# the shared CONTRACT surface (each domain's `<module>events` package + `admin/adminapi`) or a
# service interface from the registry (which, thanks to Go's structural typing, needs no shared
# package at all). The core foundations have no game knowledge. Only `cmd` (the composition root)
# wires modules.
#
# (Import CYCLES need no rule here — the Go compiler already rejects them.)

version: 3
workdir: .

# We enforce INTERNAL architecture only; third-party (vendor) imports are a module's own business.
allow:
  depOnAnyVendor: true

# Test fixtures are not architecture: topiccheck's testdata packages import bus and
# each other only to exercise the analyzer, so exclude them from the boundary check.
# rpcgen's testdata is the same shape: an <name>api + generated <name>rpc golden that
# import edge/opsapi/adminapi purely to exercise the generator — not real architecture.
exclude:
  - tools/topiccheck/testdata
  - tools/rpcgen/testdata

components:
  # The core foundations, split from the old monolithic `core`:
  #   bus/registry/contrib are LEAVES (stdlib only), importable by everyone (commonComponents);
  #   lifecycle wires them into Context + the App orchestrator, and modules import it.
  bus:         { in: bus }
  registry:    { in: registry }
  contrib:     { in: contrib }
  # Cross-cutting HTTP middleware (rate limit, trusted-proxy client IP). A LEAF —
  # stdlib + x/time/rate only, no gamebackend package — mounted in the boot layer.
  httpmw:      { in: httpmw }
  # HTTP-metrics middleware (prometheus). NOT a leaf/commonComponent — it imports
  # a vendor package (prometheus/client_golang) beyond stdlib+x/time, and only the
  # boot layer (internal/app) mounts it; the gateway deliberately does not.
  metrics:     { in: metrics }
  lifecycle:   { in: lifecycle }
  # The only deliberately-shared surface between modules: published event descriptors + adminapi.
  # (Enumerated explicitly — go-arch-lint's `*` matches a whole path segment, not an `*events` suffix.)
  contracts:
    in:
      - api/accounts/accountsevents
      - api/accounts/accountsapi
      - api/characters/charactersevents
      - api/characters/charactersapi
      - api/config/configevents
      - api/inventory/inventoryapi
      - api/leaderboard/leaderboardapi
      - api/match/matchevents
      - api/match/matchapi
      - api/scheduler/schedulerevents
      - api/admin/adminapi

  # --- rpcglue tier: the rpcgen-GENERATED transport glue (<module>rpc) ---
  # The impl tier that MAY import edge; kept OUT of `contracts` (which stays
  # transport-free). Each <module>rpc is its own component so a module may depend
  # ONLY on its own glue (characters -> charactersrpc, accounts -> accountsrpc,
  # remote -> both). ENUMERATED, not an `api/**/**rpc` glob, because go-arch-lint's
  # `*` matches a WHOLE path segment. These now live under `api/<name>/…` — a tree
  # DISJOINT from `modules/<name>/` — so there is no prefix overlap with the module
  # impl components below and no ordering requirement: each rpc glue is simply its
  # own component.
  charactersrpc:
    in:
      - api/characters/charactersrpc
  charactersplayerrpc:
    in:
      - api/characters/charactersplayerrpc
  charactersadminrpc:
    in:
      - api/characters/charactersadminrpc
  accountsrpc:
    in:
      - api/accounts/accountsrpc
  accountsauthrpc:
    in:
      - api/accounts/accountsauthrpc
  accountsadminrpc:
    in:
      - api/accounts/accountsadminrpc
  inventoryrpc:
    in:
      - api/inventory/inventoryrpc
  leaderboardrpc:
    in:
      - api/leaderboard/leaderboardrpc
  matchrpc:
    in:
      - api/match/matchrpc

  # Each module IMPLEMENTATION is its own component, so the linter can forbid cross-impl imports.
  accounts:    { in: modules/accounts }
  admin:       { in: modules/admin }
  audit:       { in: modules/audit }
  characters:  { in: modules/characters }
  config:      { in: modules/config }
  # The gateway front-door MODULE (modules/gateway): present in every app.Run
  # process, it Contributes a front-handler to httpmw.FrontHandlerSlot so
  # internal/app fronts ctx.Mux with it WITHOUT app importing this module (D4).
  # DISTINCT from the `gateway` transport component below (the /gateway QUIC prefix
  # router + HTTP reverse proxy). Named `gatewaymod` to disambiguate; `modules/gateway`
  # does not overlap the transport `gateway` (in: gateway), so no prefix conflict.
  gatewaymod:  { in: modules/gateway }
  inventory:   { in: modules/inventory }
  leaderboard: { in: modules/leaderboard }
  match:       { in: modules/match }
  # The durable async plane's one and only module: owns schema "messaging",
  # implements bus.Transport (installed via ctx.Bus.SetTransport), imports
  # outbox to drive the relay. No other module imports messaging's impl —
  # producers/consumers reach it only via bus.EmitTx/OnTx/OnTxRaw + the
  # "messaging" registry marker.
  messaging:   { in: modules/messaging }
  rating:      { in: modules/rating }
  scheduler:   { in: modules/scheduler }
  webui:       { in: modules/webui }

  # Unified-operation leaf: the Caller transport seam a generated RPC client dials
  # through + the Operation/Slot declaration the gateway reads. Imports stdlib only
  # (context/errors) — a leaf, same tier as bus/registry/contrib (commonComponents),
  # importable by the generated <module>rpc glue, remote and the gateway.
  opsapi:      { in: opsapi }
  # Transport-agnostic leaf: QUIC RPC framing/codec/TLS. Imports stdlib + quic-go
  # only (no gamebackend package) — a foundation, same tier as core.
  edge:        { in: edge }
  # Generic transactional-outbox relay (drain+POST+ack). Imports stdlib only —
  # a foundation; a module (characters) brings its own DB handle in.
  outbox:      { in: outbox }
  # Composition-time remote stub: Provides an edge-backed client under a
  # dependency's name and contributes a RemoteFetch admin item (adminData over the
  # edge). It satisfies consumer interfaces structurally, so it never imports a
  # module's impl.
  remote:      { in: modules/remote }
  # Transport-level front door: a QUIC prefix router + HTTP reverse proxy. Imports
  # edge + stdlib only, never a module impl — the player-facing edge of the mesh.
  gateway:     { in: gateway }

  # Bespoke whole-module static analyzer: flags event topics defined via
  # bus.Define but never subscribed via bus.On. Imports ONLY x/tools + stdlib
  # (never a gamebackend package) — a standalone dev tool, not part of any binary.
  topiccheck:  { in: tools/topiccheck }

  # RPC glue generator: reads a capability interface in a <module>api package
  # (go/packages + go/types, topiccheck's toolkit) and emits the transport glue in
  # <module>rpc. Imports ONLY x/tools + stdlib (edge/opsapi are referenced as path
  # STRINGS, never imported) — a standalone dev tool, not linked into any binary,
  # modeled exactly like topiccheck (component + absent from deps + testdata excluded).
  rpcgen:      { in: tools/rpcgen }

  # Dev-only CLI that mints the shared edge mutual-TLS dev CA cert+key PEM files
  # (invoked by run.sh/run.ps1 before a split boot). Unlike topiccheck/rpcgen it
  # DOES import a gamebackend package — edge (GenerateDevCA/WritePEM) — so it has a
  # deps entry below. Not linked into any shipped binary.
  edgeca:      { in: tools/edgeca }

  # The reusable boot sequence: open DB, wire Context, two-phase Build, Migrate,
  # Start, HTTP + optional edge listener, graceful shutdown. It is topology-blind
  # — it takes a module list from an entrypoint and never names a module.
  app:         { in: internal/app }

  # The composition roots — one per binary. Each is the ONLY place that sees the
  # concrete module implementations it wires, and the per-service lists below are
  # the machine-checked isolation: characters-svc may not see inventory/admin;
  # inventory-svc may not see the accounts/characters IMPL (only their contracts,
  # via the remote stub + charactersevents).
  cmdServer:         { in: cmd/server }
  cmdCharactersSvc:  { in: cmd/characters-svc }
  cmdInventorySvc:   { in: cmd/inventory-svc }
  cmdSchedulerSvc:   { in: cmd/scheduler-svc }
  cmdGatewaySvc:     { in: cmd/gateway-svc }

commonComponents:
  # The LEAVES are importable by everyone and depend on nothing internal. lifecycle is
  # deliberately NOT common: a leaf importing lifecycle would be an import cycle.
  - bus
  - registry
  - contrib
  - httpmw
  # opsapi is a stdlib-only leaf (the Caller seam + Operation/Slot declaration),
  # imported by the generated <module>rpc glue, remote and the gateway alike.
  - opsapi

deps:
  # NOTE: `bus`/`registry`/`contrib` are intentionally ABSENT here. A component with no
  # deps entry may use only commonComponents (bus/registry/contrib). So:
  #   - the three leaves -> may use the leaves = nothing but each other/themselves => never a module.

  # contracts may ALSO depend on itself: a provider's <module>api that exposes an
  # admin fan-out capability (charactersapi/accountsapi) imports adminapi to name
  # its ItemData return type. Both sides are transport-free contract packages in this
  # SAME tier, so this stays within the shared-contract surface (never edge, never a
  # module impl) — it only sanctions <module>api <-> adminapi, the rule-5 surface.
  contracts:   { mayDependOn: [ contracts ] }

  # lifecycle aggregates the three leaves into Context + the App orchestrator.
  lifecycle:   { mayDependOn: [ bus, registry, contrib ] }

  # Each module impl may use the leaves (common) + lifecycle + the shared contracts — never another
  # module's impl. accounts/characters additionally register handlers on the shared QUIC edge server
  # (edge); characters also drives the transactional-outbox relay (outbox).
  accounts:    { mayDependOn: [ lifecycle, contracts, edge, accountsrpc, accountsauthrpc, accountsadminrpc ] }
  admin:       { mayDependOn: [ lifecycle, contracts ] }
  # audit imports the schedulerevents contract (reacts to scheduler.fired) + adminapi;
  # it logs domain events GENERICALLY by topic string, so it imports no domain payload
  # types in impl. (The anti-drift test imports them, allowed since they are all in the
  # `contracts` component.)
  audit:       { mayDependOn: [ lifecycle, contracts ] }
  characters:  { mayDependOn: [ lifecycle, contracts, edge, outbox, charactersrpc, charactersplayerrpc, charactersadminrpc ] }
  config:      { mayDependOn: [ lifecycle, contracts ] }
  # The gateway MODULE contributes a front-handler to the httpmw leaf slot and, from
  # Step B2, builds the operation-dispatch substrate: it reads opsapi (Operation/Slot
  # + Caller/Status/LocalOp — a commonComponent leaf), selects an in-process
  # (LocalBackend) or QUIC (RemoteBackend) backend via registry.TryRequire (registry
  # is common), and RemoteBackend reuses the transport-level `gateway` package's
  # RoutedBackend (dial/retry) over the `edge` transport. It imports NO module impl —
  # the whole point of the leaf-slot seam (D4). (httpmw/opsapi/registry are
  # commonComponents, importable without listing; edge + the transport gateway are
  # not, so they are listed here.)
  gatewaymod:  { mayDependOn: [ lifecycle, edge, gateway ] }
  inventory:   { mayDependOn: [ lifecycle, contracts, edge, inventoryrpc ] }
  leaderboard: { mayDependOn: [ lifecycle, contracts, leaderboardrpc ] }
  match:       { mayDependOn: [ lifecycle, contracts, matchrpc ] }
  # messaging implements bus.Transport and drives the outbox relay — it needs
  # the leaves (bus for the Transport interface + SetTransport, registry for
  # the "messaging" marker, both via commonComponents) + lifecycle + outbox.
  # It imports no *events contract (topic-agnostic; payloads are opaque bytes).
  messaging:   { mayDependOn: [ lifecycle, contracts, bus, outbox ] }
  rating:      { mayDependOn: [ lifecycle, contracts ] }
  # scheduler drives the transactional-outbox relay (outbox), like characters.
  scheduler:   { mayDependOn: [ lifecycle, contracts, outbox ] }
  webui:       { mayDependOn: [ lifecycle ] }

  # The rpcgen-generated glue: a Client over an opsapi.Caller (split path) + a
  # RegisterServer edge adapter (provider path). It MAY import edge (the transport)
  # + opsapi (the Caller/Status seam, a commonComponent) + its own <module>api
  # (in contracts). It never imports a module impl.
  charactersrpc:       { mayDependOn: [ edge, contracts ] }
  charactersplayerrpc: { mayDependOn: [ edge, contracts ] }
  charactersadminrpc:  { mayDependOn: [ edge, contracts ] }
  accountsrpc:         { mayDependOn: [ edge, contracts ] }
  accountsauthrpc:     { mayDependOn: [ edge, contracts ] }
  accountsadminrpc:    { mayDependOn: [ edge, contracts ] }
  inventoryrpc:        { mayDependOn: [ edge, contracts ] }
  leaderboardrpc:      { mayDependOn: [ edge, contracts ] }
  matchrpc:            { mayDependOn: [ edge, contracts ] }

  # The remote stub is composition-time plumbing: it wraps the generated edge
  # clients (characters*/accounts* rpc, incl. the adminData glue) + the admin
  # contract, never a module impl.
  remote:      { mayDependOn: [ lifecycle, contracts, edge, charactersrpc, charactersadminrpc, accountsrpc, accountsadminrpc ] }

  # The gateway is a transport-level front door: it relays raw edge calls and
  # reverse-proxies HTTP, so it needs only the edge transport (+ stdlib).
  gateway:     { mayDependOn: [ edge ] }

  # edgeca is a dev-only CLI that mints the shared edge mutual-TLS dev CA (run.sh/
  # run.ps1 invoke it before a split boot). It reuses edge's GenerateDevCA/WritePEM,
  # so it MAY import edge — but nothing else and no module impl; never linked into
  # a shipped binary.
  edgeca:      { mayDependOn: [ edge ] }

  # NOTE: `topiccheck` is intentionally ABSENT from `deps` (like the leaves and
  # `contracts` above): with no entry it may use only commonComponents + vendor.
  # It imports ONLY x/tools (covered by depOnAnyVendor) + stdlib, never a
  # gamebackend package — a dev tool that inspects source, not linked into a binary.

  # The boot sequence wires whatever module list it is handed; it only knows the
  # lifecycle contract and the edge server type it may start.
  app:         { mayDependOn: [ lifecycle, edge, metrics ] }

  # Each composition root may depend ONLY on the modules ITS binary hosts (plus
  # the boot package + the transport/stub foundations it wires). This is the real
  # per-service isolation, machine-checked:
  #
  #   - the monolith sees every module (one fat binary, all local, no edge/stub);
  #   - characters-svc sees ONLY accounts + characters (+ edge to expose them);
  #   - inventory-svc sees inventory + admin + the remote stub — NOT the
  #     accounts/characters impl, whose capabilities arrive over the edge.
  cmdServer:
    mayDependOn:
      - accounts
      - admin
      - audit
      - characters
      - config
      - gatewaymod
      - inventory
      - leaderboard
      - match
      - messaging
      - rating
      - scheduler
      - webui
      - lifecycle
      - app
  cmdCharactersSvc:
    mayDependOn:
      - accounts
      - characters
      - gatewaymod
      - messaging
      - lifecycle
      - edge
      - app
  cmdInventorySvc:
    mayDependOn:
      - inventory
      - admin
      - audit
      - config
      - gatewaymod
      - messaging
      - remote
      - lifecycle
      - edge
      - app
  #   - scheduler-svc hosts ONLY scheduler (a pure event producer, no edge).
  cmdSchedulerSvc:
    mayDependOn:
      - scheduler
      - gatewaymod
      - messaging
      - lifecycle
      - app
  #   - gateway-svc is the SINGLE front door: it dispatches player ops over the
  #     edge (gatewaymod.RemoteBackend) instead of HTTP-proxying to the backends'
  #     own front-handlers. So it depends on the gateway MODULE (NewOpsMux /
  #     RemoteBackend / SessionVerifier), the transport gateway (RoutedBackend /
  #     HTTP proxy), edge, and each split-hosted player module's IMPL-FREE rpc glue
  #     (RouteBindings + the accounts session client) — NOT the module impls. opsapi
  #     is a commonComponent (leaf), importable without listing. leaderboard/match
  #     rpc are absent: those ops are monolith-only.
  cmdGatewaySvc:
    mayDependOn:
      - gatewaymod
      - gateway
      - edge
      - charactersplayerrpc
      - accountsauthrpc
      - accountsrpc
      - inventoryrpc
