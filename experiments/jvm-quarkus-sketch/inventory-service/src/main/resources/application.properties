# ============================================================================
# inventory-service  —  SPLIT PROCESS B   (roles: inventory, admin)
# ----------------------------------------------------------------------------
# A SEPARATE fast-jar that links ONLY inventory + admin + characters-client (the REMOTE
# PlayerCharacters producer) — NO characters/accounts impl. The old %inventory profile baked in as the
# BASE config of its own app-shell.
#
# This process:
#   * runs inventory migrations (roles gate them);
#   * gets the REMOTE PlayerCharacters producer (characters-client is present, characters impl is not)
#     — the sync ownerOf capability dials process A's edge QUIC server at CHARACTERS_EDGE_ADDR (:9100);
#   * is the async CONSUMER: its /events/* REST endpoints receive character events POSTed by process A;
#   * is the admin host that fans out — local inventory provider + remote characters over Stork REST;
#   * publishes nothing, so no outbox/fanout config.
# ============================================================================

# roles gate inventory migrations and the admin local/remote branch (characters not active => REST).
roles=inventory,admin

# HTTP port. QUARKUS_HTTP_PORT env overrides (install.ps1 sets it).
quarkus.http.port=8081

# --- Datasource (shared Postgres; one schema per module, no cross-module FKs) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gamebackend
quarkus.datasource.password=gamebackend
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jvmsketch}

# Additive event evolution (CLAUDE.md rule #6): unknown properties ignored globally.
quarkus.jackson.fail-on-unknown-properties=false

# --- Edge QUIC transport (this process is the ownerOf CLIENT) -------------------
# The characters-client producer dials process A's edge QUIC server here. CHARACTERS_EDGE_ADDR env
# overrides (install.ps1 sets it); default = process A's :9100.
edge.client.characters.target=${CHARACTERS_EDGE_ADDR:localhost:9100}

# --- Admin fan-out -------------------------------------------------------------
# Which modules the console composes. inventory is local (role-active) -> local AdminDataProvider;
# characters is NOT local here -> admin fetches its /admin-data over REST at stork://characters-service.
admin.modules=characters,inventory
admin.characters.url=stork://characters-service

# Stork static discovery: characters-service -> process A's HTTP address, consumed by the admin REST
# fan-out client. CHARACTERS_ADDR env overrides (install.ps1 sets it); default = process A's :8080.
quarkus.stork.characters-service.service-discovery.type=static
quarkus.stork.characters-service.service-discovery.address-list=${CHARACTERS_ADDR:localhost:8080}

# --- ArC build-time strictness (verification Layer 0) --------------------------
# See app/application.properties for the full rationale. Two flags are ACTIVE (real app-code canaries);
# two are DISABLED because they only break framework beans / our idiomatic constructor injection, not
# a real bug (proven empirically, not assumed).
#
# ACTIVE:
quarkus.arc.detect-wrong-annotations=true
quarkus.arc.fail-on-intercepted-private-method=true
#
# DISABLED (would need an app-wide scope refactor / framework changes to go green — out of scope):
#   * transform-unproxyable-classes=false rejects every constructor-injected normal-scoped bean (no
#     no-arg proxy ctor) AND a framework synthetic bean (SmallRyeManagedExecutor); no final-bean bug
#     exists here (allOpen already opens them).
#   * strict-compatibility=true rejects Quarkus's own agroal DataSources / health beans.
# quarkus.arc.transform-unproxyable-classes=false
# quarkus.arc.strict-compatibility=true
