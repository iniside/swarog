# ============================================================================
# gateway-service  —  the EXTERNAL FRONT DOOR   (roles: gateway)
# ----------------------------------------------------------------------------
# A SEPARATE fast-jar that links ONLY gateway + edge + platform — no feature impls, no Stork. It is a
# pure QUIC prefix ROUTER: a player dials THIS process's QUIC port, and the gateway byte-relays each
# method family to the owning service (characters.* -> characters-service, inventory.* -> inventory-
# service). Topology is chosen by which jar you run, not by a profile.
#
# This process:
#   * has NO database (no jdbc/hibernate extension on the classpath -> Quarkus never opens a datasource);
#   * stands up the gateway QUIC server on :9200 (GatewayEdgeServer starts because roles=gateway, not
#     all), secured by EDGE_CERT_THUMBPRINT (its own schannel server cert);
#   * dials the two downstream edge servers by PLAIN host:port config (NOT Stork):
#       characters.* -> CHARACTERS_EDGE_ADDR (default process A :9100)
#       inventory.*  -> INVENTORY_EDGE_ADDR  (default process B :9101)
#   * exposes /q/health/ready for the install.ps1 readiness poll over its HTTP port.
# ============================================================================

# roles gate the gateway start: gateway (not all) => isMonolith=false, isActive("gateway")=true => the
# router starts. No migrations, no producers — this process hosts no feature module.
roles=gateway

# HTTP port (health only; the real player traffic is QUIC on gateway.quic.port). QUARKUS_HTTP_PORT env
# overrides (install.ps1 sets it).
quarkus.http.port=8082

# Additive event evolution (CLAUDE.md rule #6): unknown properties ignored globally.
quarkus.jackson.fail-on-unknown-properties=false

# --- Gateway QUIC front door + routing table (PLAIN host:port, NOT Stork) -------
# The gateway's OWN external QUIC listener (players dial this). Needs a schannel cert whose thumbprint
# is EDGE_CERT_THUMBPRINT (set by install.ps1 via scripts/ensure-cert.ps1); absent/empty => loud fail.
edge.server.cert-thumbprint=${EDGE_CERT_THUMBPRINT:}
gateway.quic.port=9200
# Downstream targets: the SAME plain host:port seam the split already uses for the ownerOf client. env
# overrides (install.ps1 sets CHARACTERS_EDGE_ADDR / INVENTORY_EDGE_ADDR).
gateway.route.characters.target=${CHARACTERS_EDGE_ADDR:localhost:9100}
gateway.route.inventory.target=${INVENTORY_EDGE_ADDR:localhost:9101}

# --- ArC build-time strictness (verification Layer 0) --------------------------
# See app/application.properties for the full rationale. Two flags are ACTIVE (real app-code canaries);
# two are DISABLED because they only break framework beans / our idiomatic constructor injection.
#
# ACTIVE:
quarkus.arc.detect-wrong-annotations=true
quarkus.arc.fail-on-intercepted-private-method=true
#
# DISABLED (see app/application.properties):
# quarkus.arc.transform-unproxyable-classes=false
# quarkus.arc.strict-compatibility=true
