# ============================================================================
# characters-service  —  SPLIT PROCESS A   (roles: accounts, characters)
# ----------------------------------------------------------------------------
# A SEPARATE fast-jar that links ONLY accounts + characters (no inventory/admin, no
# characters-client). This is the old %characters profile baked in as the BASE config of its own
# app-shell — topology is chosen by which jar you run, not by QUARKUS_PROFILE.
#
# This process:
#   * runs accounts + characters migrations (roles gate them);
#   * gets the LOCAL PlayerCharacters producer (the `characters` impl is present) — no QUIC client;
#   * stands up the edge QUIC SERVER for characters.ownerOf on :9100 (CharactersEdgeServer starts
#     because roles != all AND characters is active), secured by EDGE_CERT_THUMBPRINT;
#   * is the outbox PRODUCER that POSTs characters.created / characters.deleted to process B's
#     inventory sink (INVENTORY_ADDR redirects the fanout target; default = inventory-service :8081);
#   * accounts.registered has no subscriber, so its outbox rows are marked sent locally.
# ============================================================================

# roles gate migrations, the outbox relay, and the edge-server start. accounts,characters => not
# monolith (isMonolith=false) so the QUIC server starts; inventory/admin absent (not this jar's job).
roles=accounts,characters

# HTTP port. QUARKUS_HTTP_PORT env overrides (install.ps1 sets it).
quarkus.http.port=8080

# --- Datasource (shared Postgres; one schema per module, no cross-module FKs) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gamebackend
quarkus.datasource.password=gamebackend
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jvmsketch}

# Additive event evolution (CLAUDE.md rule #6): unknown properties ignored globally.
quarkus.jackson.fail-on-unknown-properties=false

# --- Edge QUIC transport (this process is the ownerOf SERVER) -------------------
# schannel needs the CurrentUser-store cert whose thumbprint is EDGE_CERT_THUMBPRINT (set by
# install.ps1 via scripts/ensure-cert.ps1). If absent/empty the server startup fails loudly.
edge.server.cert-thumbprint=${EDGE_CERT_THUMBPRINT:}
edge.server.characters.port=9100

# --- Async events (broker-less HTTP fanout) ------------------------------------
# The characters outbox relay POSTs each unsent row's JSON payload to the subscriber URL(s) below.
# INVENTORY_ADDR points the fanout at process B (inventory-service); default = localhost:8081.
events.subscribers."characters.created"=http://${INVENTORY_ADDR:localhost:8081}/events/character-created
events.subscribers."characters.deleted"=http://${INVENTORY_ADDR:localhost:8081}/events/character-deleted

# --- ArC build-time strictness (verification Layer 0) --------------------------
# See app/application.properties for the full rationale. Two flags are ACTIVE (real app-code canaries);
# two are DISABLED because they only break framework beans / our idiomatic constructor injection, not
# a real bug (proven empirically, not assumed).
#
# ACTIVE:
quarkus.arc.detect-wrong-annotations=true
quarkus.arc.fail-on-intercepted-private-method=true
#
# DISABLED (would need an app-wide scope refactor / framework changes to go green — out of scope):
#   * transform-unproxyable-classes=false rejects every constructor-injected normal-scoped bean (no
#     no-arg proxy ctor) AND a framework synthetic bean (SmallRyeManagedExecutor); no final-bean bug
#     exists here (allOpen already opens them).
#   * strict-compatibility=true rejects Quarkus's own agroal DataSources / health beans.
# quarkus.arc.transform-unproxyable-classes=false
# quarkus.arc.strict-compatibility=true
