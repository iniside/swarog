# @QuarkusTest overrides.
#
# Quarkus test mode binds the HTTP server to `quarkus.http.test-port` (default 8081), NOT
# `quarkus.http.port` (8090, set in src/main/resources/application.properties). The characters
# outbox relay's default subscriber URLs (events.subscribers."characters.*") target
# `localhost:${INVENTORY_ADDR:8090}` — i.e. "self" in the monolith. Pinning the test port to 8090
# too means that default keeps working UNCHANGED inside @QuarkusTest, so the crown-jewel test
# exercises the REAL transactional-outbox -> HTTP fanout -> inbox pipeline, not a shortcut around it.
quarkus.http.test-port=8090
