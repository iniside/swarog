# Same port + same dedicated DB as the framework-free sketch (they share the mirror database;
# run one at a time — each truncates and reseeds the demo data at boot).
quarkus.http.port=8090
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gamebackend
quarkus.datasource.password=gamebackend
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jvmsketch}
# Comment the jdbc.url line out (with Docker running) and Dev Services will boot a throwaway
# Postgres in Testcontainers for `gradlew quarkusDev` — no local DB needed at all.

# Additive event evolution (CLAUDE.md rule #6): a new field on a published payload must not break
# older consumers, so Jackson ignores unknown properties globally rather than failing the parse.
quarkus.jackson.fail-on-unknown-properties=false

# Inert gRPC client target so the @GrpcClient("characters") injection point resolves in every role.
# The channel is LAZY (connects on first call), so in the monolith — where the produced PlayerCharacters
# takes the local branch — this client is injected but never dialed. Step 7 overrides host with
# stork://characters-service for the split topology.
quarkus.grpc.clients.characters.host=localhost
quarkus.grpc.clients.characters.port=9000
