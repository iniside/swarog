# ============================================================================
# MONOLITH config  (roles=all, ONE process, NO broker) — the `app` fast-jar.
# ----------------------------------------------------------------------------
# Per-service split is now PACKAGING, not profiles: each topology is a SEPARATE
# fast-jar (app = monolith, characters-service = process A, inventory-service =
# process B), and each app-shell carries its OWN application.properties. So this
# file is ONLY the monolith config — the old %characters / %inventory profile
# blocks moved into characters-service / inventory-service respectively.
#
# Every module is co-located and active, so:
#   * async events are broker-less HTTP fanout: the characters outbox relay POSTs
#     each event to the inventory event-sink endpoints on THIS process
#     (INVENTORY_ADDR defaults to localhost:8090 = self). No Kafka, no SmallRye.
#   * the produced PlayerCharacters is the LOCAL producer (only the `characters`
#     impl is on the classpath; characters-client is NOT); no QUIC edge client is
#     ever dialed (and no server cert is needed).
#   * admin fans out to LOCAL AdminDataProviders for every module.
# ============================================================================

# roles gate migrations, the produced-bean local/remote branch, and the outbox
# relays. Monolith = everything. Each role-profile sets its own subset below;
# the ROLES env var also wins (relaxed mapping ROLES -> roles).
roles=all

# HTTP port. QUARKUS_HTTP_PORT env overrides per process so N processes can share
# localhost (monolith 8090; split A=8090, B=8091 — set by install.ps1).
quarkus.http.port=8090

# --- Datasource (shared Postgres; one schema per module, no cross-module FKs) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gamebackend
quarkus.datasource.password=gamebackend
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jvmsketch}
# Comment the jdbc.url line out (with Docker running) and Dev Services boots a
# throwaway Postgres in Testcontainers for `gradlew quarkusDev`.

# Additive event evolution (CLAUDE.md rule #6): a new field on a published payload
# must not break older consumers, so Jackson ignores unknown properties globally.
quarkus.jackson.fail-on-unknown-properties=false

# --- Edge QUIC transport (monolith: OFF) ---------------------------------------
# The monolith (roles=all) takes the LOCAL PlayerCharacters producer and never dials
# QUIC, and CharactersEdgeServer.start() returns early (isMonolith). But the
# CharactersEdgeServer BEAN is still constructed, so its two @ConfigProperty
# injections must resolve — hence these two keys stay (cert-thumbprint empty, port
# unused). The QUIC SERVER config that matters lives in characters-service; the QUIC
# CLIENT target lives in inventory-service.
edge.server.cert-thumbprint=${EDGE_CERT_THUMBPRINT:}
edge.server.characters.port=9100
# Same story for InventoryEdgeServer: the BEAN is constructed in the monolith (so its @ConfigProperty
# port must resolve) but start() returns early (isMonolith), so this port is unused here.
edge.server.inventory.port=9101

# --- Async events (broker-less HTTP fanout) ------------------------------------
# The publishing module's outbox relay POSTs each unsent row's JSON payload to the
# subscriber URL(s) mapped from its topic here (comma-separate for multiple
# subscribers). A topic with NO entry (e.g. accounts.registered — no consumer yet)
# drains to zero subscribers and is marked sent immediately.
#
# INVENTORY_ADDR points the fanout at whichever process hosts the inventory sink:
# monolith = localhost:8090 (self); split = localhost:8091 (process B), set by
# install.ps1 as an env var on process A. The SAME base config works for both modes.
events.subscribers."characters.created"=http://${INVENTORY_ADDR:localhost:8090}/events/character-created
events.subscribers."characters.deleted"=http://${INVENTORY_ADDR:localhost:8090}/events/character-deleted

# --- Admin fan-out -------------------------------------------------------------
# Which modules the console composes. In the monolith every module is active, so admin
# takes the LOCAL AdminDataProvider branch for each and admin.<id>.url is never dialed.
admin.modules=characters,inventory

# --- ArC build-time strictness (verification Layer 0) --------------------------
# Push CDI wiring bugs from runtime to AUGMENTATION (quarkusBuild). Two of these fail the build on a
# genuine mistake in OUR code; the other two, verified empirically on this module set, only break
# framework beans / our idiomatic DI style and are left off with the reason recorded (nothing hidden).
#
# ACTIVE — real, app-code-scoped canaries. NOTE: .properties has NO inline comments — a trailing
# `# ...` becomes part of the VALUE, so `=true # x` parses as the string "true # x" → Boolean false,
# silently disabling the gate (SRCFG01008). Comments MUST be on their own lines.
# detect-wrong-annotations: e.g. a Spring/Jakarta annotation on the wrong element.
quarkus.arc.detect-wrong-annotations=true
# fail-on-intercepted-private-method: @Transactional/@Scheduled on a private method = silent no-op -> build error.
quarkus.arc.fail-on-intercepted-private-method=true
#
# DISABLED — both were tried and REJECTED because neither can go green without changes outside our
# control (proven, not assumed — see docs Layer-0 notes):
#   * transform-unproxyable-classes=false: the plan expected this to flag Kotlin-`final` beans, but
#     allOpen already opens every @ApplicationScoped class, so ZERO final-bean bugs exist. What it
#     actually does here is reject every constructor-injected normal-scoped bean (16 of ours) for
#     lacking a no-arg proxy constructor — Quarkus normally synthesizes it; =false turns our idiomatic
#     constructor injection into an error. It ALSO fails a framework SYNTHETIC bean
#     (io.smallrye.context.SmallRyeManagedExecutor), so even converting all 16 of ours to @Singleton
#     could not make it green. Enabling it = an app-wide scope refactor, out of scope for a strict pass.
#   * strict-compatibility=true: rejects Quarkus's OWN beans (io.quarkus.agroal.runtime.DataSources,
#     io.quarkus.smallrye.health...QuarkusAsyncHealthCheckFactory) as lacking a spec-valid bean
#     constructor. Unfixable in app code.
# quarkus.arc.transform-unproxyable-classes=false
# quarkus.arc.strict-compatibility=true
