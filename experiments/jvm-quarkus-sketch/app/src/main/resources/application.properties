# ============================================================================
# BASE PROFILE = MONOLITH  (roles=all, ONE process, NO broker).
# ----------------------------------------------------------------------------
# Every module is co-located and active, so:
#   * async events are broker-less HTTP fanout: the characters outbox relay POSTs
#     each event to the inventory event-sink endpoints on THIS process
#     (INVENTORY_ADDR defaults to localhost:8090 = self). No Kafka, no SmallRye.
#   * the produced PlayerCharacters takes the LOCAL branch; no QUIC edge client is
#     ever dialed (and no server cert is needed).
#   * admin fans out to LOCAL AdminDataProviders for every module.
# Topology is chosen purely by QUARKUS_PROFILE at launch (Step 9 install.ps1).
# The monolith runs with NO profile (this base config); the role-profiles below
# (%characters / %inventory) OVERRIDE only what a split process must change:
# the roles set and the admin-data REST (Stork) target. The edge QUIC target and
# server cert are carried by the CHARACTERS_EDGE_ADDR/EDGE_CERT_THUMBPRINT envs. The
# async fanout target is redirected by the INVENTORY_ADDR env alone (self in the
# monolith, process B in the split) — no per-profile messaging block needed.
# ============================================================================

# roles gate migrations, the produced-bean local/remote branch, and the outbox
# relays. Monolith = everything. Each role-profile sets its own subset below;
# the ROLES env var also wins (relaxed mapping ROLES -> roles).
roles=all

# HTTP port. QUARKUS_HTTP_PORT env overrides per process so N processes can share
# localhost (monolith 8090; split A=8090, B=8091 — set by install.ps1).
quarkus.http.port=8090

# --- Datasource (shared Postgres; one schema per module, no cross-module FKs) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gamebackend
quarkus.datasource.password=gamebackend
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jvmsketch}
# Comment the jdbc.url line out (with Docker running) and Dev Services boots a
# throwaway Postgres in Testcontainers for `gradlew quarkusDev`.

# Additive event evolution (CLAUDE.md rule #6): a new field on a published payload
# must not break older consumers, so Jackson ignores unknown properties globally.
quarkus.jackson.fail-on-unknown-properties=false

# --- Edge QUIC transport (sync ownerOf capability, over real QUIC via msquic) --
# In split-microservices mode, the characters process (role "characters") runs a
# QUIC edge server for "characters.ownerOf" on port 9100, secured with the
# CurrentUser-store cert whose thumbprint is EDGE_CERT_THUMBPRINT (set by
# install.ps1 via scripts/ensure-cert.ps1 in split mode). The inventory process
# dials that server at CHARACTERS_EDGE_ADDR. The monolith uses NEITHER of these
# (roles=all takes the local in-process branch, no QUIC/cert involved) — no
# %characters./%inventory. overrides are needed here because the env vars alone
# carry the per-process differences, the same pattern as INVENTORY_ADDR/
# CHARACTERS_ADDR above.
edge.server.cert-thumbprint=${EDGE_CERT_THUMBPRINT:}
edge.server.characters.port=9100
edge.client.characters.target=${CHARACTERS_EDGE_ADDR:localhost:9100}

# --- Async events (broker-less HTTP fanout) ------------------------------------
# The publishing module's outbox relay POSTs each unsent row's JSON payload to the
# subscriber URL(s) mapped from its topic here (comma-separate for multiple
# subscribers). A topic with NO entry (e.g. accounts.registered — no consumer yet)
# drains to zero subscribers and is marked sent immediately.
#
# INVENTORY_ADDR points the fanout at whichever process hosts the inventory sink:
# monolith = localhost:8090 (self); split = localhost:8091 (process B), set by
# install.ps1 as an env var on process A. The SAME base config works for both modes.
events.subscribers."characters.created"=http://${INVENTORY_ADDR:localhost:8090}/events/character-created
events.subscribers."characters.deleted"=http://${INVENTORY_ADDR:localhost:8090}/events/character-deleted

# --- Admin fan-out -------------------------------------------------------------
# Which modules the console composes. In the monolith every module is active, so admin
# takes the LOCAL AdminDataProvider branch for each and admin.<id>.url is never dialed.
# The split profiles flip absent modules to the REST-over-Stork branch.
admin.modules=characters,inventory


# ============================================================================
# %characters  —  SPLIT PROCESS A   (roles: accounts, characters)   HTTP 8090 / QUIC 9100
# ----------------------------------------------------------------------------
# Runs accounts + characters migrations; is the edge QUIC SERVER for ownerOf (on
# port 9100, secured by EDGE_CERT_THUMBPRINT); is the outbox PRODUCER that POSTs
# characters.created / characters.deleted to process B's inventory sink. It does NOT
# consume events.
# The fanout target is process B: install.ps1 sets INVENTORY_ADDR=localhost:8091
# on this process, so the base events.subscribers.* URLs resolve to B.
# accounts.registered has no subscriber, so its outbox rows are marked sent locally.
# ============================================================================
%characters.roles=accounts,characters


# ============================================================================
# %inventory  —  SPLIT PROCESS B   (roles: inventory, admin)   HTTP 8091
# ----------------------------------------------------------------------------
# Runs inventory migrations; is the async CONSUMER (its /events/* REST endpoints
# receive character events POSTed by process A); is the edge QUIC CLIENT of ownerOf ->
# process A (via CHARACTERS_EDGE_ADDR); is the admin host that fans out (local
# inventory + remote characters over Stork REST). It publishes nothing, so no fanout config.
# ============================================================================
%inventory.roles=inventory,admin
# Default port for this process; QUARKUS_HTTP_PORT env still wins (install.ps1 sets it).
%inventory.quarkus.http.port=8091

# Stork static discovery: characters-service -> A's HTTP address, consumed by the
# admin REST fan-out client (stork://characters-service). CHARACTERS_ADDR env
# overrides (install.ps1 sets it per topology). The sync ownerOf capability no longer
# uses Stork — it dials A's QUIC edge server directly via CHARACTERS_EDGE_ADDR.
%inventory.quarkus.stork.characters-service.service-discovery.type=static
%inventory.quarkus.stork.characters-service.service-discovery.address-list=${CHARACTERS_ADDR:localhost:8090}

# Admin fan-out: characters is NOT local in B, so admin fetches its /admin-data over
# REST at the SAME Stork service (the Quarkus REST client consumes Stork via the
# stork:// URI scheme). inventory stays local (role-active) -> no admin.inventory.url.
%inventory.admin.characters.url=stork://characters-service
