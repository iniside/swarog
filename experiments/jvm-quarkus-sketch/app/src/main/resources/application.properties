# ============================================================================
# BASE PROFILE = MONOLITH  (roles=all, ONE process, NO messaging connectors).
# ----------------------------------------------------------------------------
# Every module is co-located and active, so:
#   * all three event channels are INTERNAL (in-JVM): both ends live in this
#     process and the SmallRye graph closes without Kafka. Adding a connector
#     here would be WRONG — an internal channel needs both ends in-process,
#     which the monolith already has.
#   * the produced PlayerCharacters takes the LOCAL branch; the @GrpcClient is
#     injected but never dialed.
#   * admin fans out to LOCAL AdminDataProviders for every module.
# Topology is chosen purely by QUARKUS_PROFILE at launch (Step 9 install.ps1).
# The monolith runs with NO profile (this base config); the role-profiles below
# (%characters / %inventory) OVERRIDE only what a split process must change:
# which channel ends are Kafka vs disabled, plus the Stork targets.
# ============================================================================

# roles gate migrations, the produced-bean local/remote branch, and the outbox
# relays. Monolith = everything. Each role-profile sets its own subset below;
# the ROLES env var also wins (relaxed mapping ROLES -> roles).
roles=all

# HTTP port. QUARKUS_HTTP_PORT env overrides per process so N processes can share
# localhost (monolith 8090; split A=8090, B=8091 — set by install.ps1).
quarkus.http.port=8090

# --- Datasource (shared Postgres; one schema per module, no cross-module FKs) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gamebackend
quarkus.datasource.password=gamebackend
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jvmsketch}
# Comment the jdbc.url line out (with Docker running) and Dev Services boots a
# throwaway Postgres in Testcontainers for `gradlew quarkusDev`.

# Additive event evolution (CLAUDE.md rule #6): a new field on a published payload
# must not break older consumers, so Jackson ignores unknown properties globally.
quarkus.jackson.fail-on-unknown-properties=false

# --- gRPC (sync ownerOf capability) --------------------------------------------
# UNIFIED SERVER: serve gRPC OVER the HTTP port (no separate gRPC port). This is the
# topology switch that lets N processes coexist on localhost without a gRPC port
# clash, and lets the client reach characters on its HTTP port via Stork.
quarkus.grpc.server.use-separate-server=false
# Use the Vert.x-based Quarkus gRPC client — pairs cleanly with the unified Vert.x
# gRPC server and enables the Stork name-resolver used by %inventory.
quarkus.grpc.clients.characters.use-quarkus-grpc-client=true
# Plaintext, no TLS (dev/local). This is also the default when no TLS is configured.
quarkus.grpc.clients.characters.plain-text=true
# Inert client target so the @GrpcClient("characters") injection resolves in EVERY
# role. In the monolith the produced PlayerCharacters takes the LOCAL branch, so this
# lazy channel (connects on first call) is never dialed. %inventory overrides host
# with the Stork service name.
quarkus.grpc.clients.characters.host=localhost
quarkus.grpc.clients.characters.port=9000

# --- Messaging (event bus) -----------------------------------------------------
# NO connectors in base: all three channels (accounts.registered, characters.created,
# characters.deleted) are INTERNAL. Each has BOTH ends on the classpath in this one
# process, so the graph closes in-JVM. Connectors are added ONLY in the role-profiles.
# Kafka bootstrap is harmless here (no connector references it); it exists so the key
# is present and env-overridable once the split profiles turn connectors on.
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# --- Admin fan-out -------------------------------------------------------------
# Which modules the console composes. In the monolith every module is active, so admin
# takes the LOCAL AdminDataProvider branch for each and admin.<id>.url is never dialed.
# The split profiles flip absent modules to the REST-over-Stork branch.
admin.modules=characters,inventory


# ============================================================================
# %characters  —  SPLIT PROCESS A   (roles: accounts, characters)   HTTP+gRPC 8090
# ----------------------------------------------------------------------------
# Runs accounts + characters migrations; is the gRPC SERVER for ownerOf (unified,
# on the HTTP port); is the Kafka PRODUCER of characters.created / characters.deleted.
# It does NOT consume those events (inventory lives in process B).
# accounts.registered stays INTERNAL here: its producer relay AND its no-op @Incoming
# sink both live in the accounts module (active in this process), so that channel's
# graph closes in-JVM — it never gets a Kafka connector, in any profile.
# ============================================================================
%characters.roles=accounts,characters

# characters.created — OUTGOING to Kafka (this process produces it).
%characters.mp.messaging.outgoing."characters.created".connector=smallrye-kafka
%characters.mp.messaging.outgoing."characters.created".topic=characters.created
%characters.mp.messaging.outgoing."characters.created".value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
# INCOMING disabled — process A must NOT consume: the inventory @Incoming consumer
# (on the classpath but role-inactive) must not register or join a Kafka group here.
%characters.mp.messaging.incoming."characters.created".enabled=false

# characters.deleted — same split: produce to Kafka, do not consume.
%characters.mp.messaging.outgoing."characters.deleted".connector=smallrye-kafka
%characters.mp.messaging.outgoing."characters.deleted".topic=characters.deleted
%characters.mp.messaging.outgoing."characters.deleted".value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
%characters.mp.messaging.incoming."characters.deleted".enabled=false


# ============================================================================
# %inventory  —  SPLIT PROCESS B   (roles: inventory, admin)   HTTP 8091
# ----------------------------------------------------------------------------
# Runs inventory migrations; is the Kafka CONSUMER of characters.created / deleted;
# is the gRPC CLIENT of ownerOf -> process A (via Stork); is the admin host that fans
# out (local inventory + remote characters over Stork REST).
# accounts.registered stays INTERNAL: the accounts relay is role-inactive (idle) but
# its @Channel emitter AND its no-op @Incoming sink are both on the classpath, so the
# internal channel graph still closes in-process (no connector, no boot failure).
# ============================================================================
%inventory.roles=inventory,admin
# Default port for this process; QUARKUS_HTTP_PORT env still wins (install.ps1 sets it).
%inventory.quarkus.http.port=8091

# characters.created — INCOMING from Kafka (this process consumes it).
%inventory.mp.messaging.incoming."characters.created".connector=smallrye-kafka
%inventory.mp.messaging.incoming."characters.created".topic=characters.created
%inventory.mp.messaging.incoming."characters.created".value.deserializer=inventory.CharacterCreatedDeserializer
%inventory.mp.messaging.incoming."characters.created".group.id=inventory
# DLQ is Kafka-only — a failed record parks on characters.created-dlq instead of
# blocking the partition. NEVER valid on an internal channel, hence not in base.
%inventory.mp.messaging.incoming."characters.created".failure-strategy=dead-letter-queue
# OUTGOING bound to Kafka but IDLE — process B does not produce character events, but
# CharactersOutboxRelay (on the classpath) injects a @Channel MutinyEmitter for this
# channel, and SmallRye does NOT register a DISABLED channel, so `enabled=false` here
# would fail the emitter injection at boot (SRMSG00019). Instead we register it as a
# Kafka producer that never fires: the relay is role-inactive, so it never calls send.
# (Disabling is only safe on the INCOMING side above, which is a @Incoming METHOD with
# no injection point — and MUST be disabled in %characters so A doesn't join the group.)
%inventory.mp.messaging.outgoing."characters.created".connector=smallrye-kafka
%inventory.mp.messaging.outgoing."characters.created".topic=characters.created
%inventory.mp.messaging.outgoing."characters.created".value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# characters.deleted — same: consume from Kafka; outgoing is an idle Kafka producer
# (registered so the relay's emitter injects, but never fires — relay is role-inactive).
%inventory.mp.messaging.incoming."characters.deleted".connector=smallrye-kafka
%inventory.mp.messaging.incoming."characters.deleted".topic=characters.deleted
%inventory.mp.messaging.incoming."characters.deleted".value.deserializer=inventory.CharacterDeletedDeserializer
%inventory.mp.messaging.incoming."characters.deleted".group.id=inventory
%inventory.mp.messaging.incoming."characters.deleted".failure-strategy=dead-letter-queue
%inventory.mp.messaging.outgoing."characters.deleted".connector=smallrye-kafka
%inventory.mp.messaging.outgoing."characters.deleted".topic=characters.deleted
%inventory.mp.messaging.outgoing."characters.deleted".value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# gRPC CLIENT -> process A via Stork. name-resolver=stork means `host` is a Stork
# SERVICE NAME (a plain name, NOT a stork:// URI); the static list below resolves it
# to A's HTTP port (unified server).
%inventory.quarkus.grpc.clients.characters.name-resolver=stork
%inventory.quarkus.grpc.clients.characters.host=characters-service

# Stork static discovery: characters-service -> A's HTTP/gRPC address.
# CHARACTERS_ADDR env overrides (install.ps1 sets it per topology).
%inventory.quarkus.stork.characters-service.service-discovery.type=static
%inventory.quarkus.stork.characters-service.service-discovery.address-list=${CHARACTERS_ADDR:localhost:8090}

# Admin fan-out: characters is NOT local in B, so admin fetches its /admin-data over
# REST at the SAME Stork service (the Quarkus REST client consumes Stork via the
# stork:// URI scheme). inventory stays local (role-active) -> no admin.inventory.url.
%inventory.admin.characters.url=stork://characters-service
