# Backing services for jvm-quarkus-sketch, both deploy modes.
#
# There is NO broker in either mode: async events are broker-less HTTP fanout (the characters
# outbox relay POSTs each event directly to the inventory event-sink endpoints — the same
# cross-process transport as the sync gRPC ownerOf and the admin-data REST fan-out).
#
# `postgres` is the only backing service, shared (schema-isolated) by both the monolith and the
# microservices split, matching app/src/main/resources/application.properties (db=jvmsketch,
# user/pass=gamebackend, port 5432). It is OPTIONAL: the sketch normally assumes a local Postgres
# already on 5432, so `install.ps1` only starts this one with `-WithPostgres`
# (`docker compose -f infra/docker-compose.yml up -d postgres`).

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: jvmsketch
      POSTGRES_USER: gamebackend
      POSTGRES_PASSWORD: gamebackend
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamebackend"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
