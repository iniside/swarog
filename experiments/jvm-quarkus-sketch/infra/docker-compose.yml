# Backing services for jvm-quarkus-sketch, both deploy modes.
#
# - `postgres` is always needed (monolith AND microservices share the same schema-isolated
#   database, matching app/src/main/resources/application.properties: db=jvmsketch,
#   user/pass=gamebackend, port 5432). `install.ps1` runs `docker compose up postgres` for
#   BOTH modes.
# - `redpanda` is the Kafka-API broker used ONLY for the cross-process event bus in
#   microservices mode (single-node, no ZooKeeper). It sits behind the `microservices`
#   compose profile, so a plain `docker compose up postgres` (monolith) never starts it;
#   `install.ps1 -Mode microservices` brings it up via
#   `docker compose --profile microservices up -d postgres redpanda`.

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: jvmsketch
      POSTGRES_USER: gamebackend
      POSTGRES_PASSWORD: gamebackend
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamebackend"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:latest
    profiles:
      - microservices
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
