[package]
name = "remote"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# `remote` — the registry SWAP. A `Stub` module stands in for a provider hosted in a
# PEER process: in phase-1 `register` it `provide`s a generated edge CLIENT under the
# SAME capability keys the local impl would, so a co-hosted consumer's `require` is
# topology-blind. It imports only foundations + edge + the provider's `*api` contract
# (its generated rpc glue) — NEVER the provider's impl crate (CLAUDE.md #2).
[dependencies]
edge = { workspace = true }
opsapi = { workspace = true }
registry = { workspace = true }
lifecycle = { workspace = true }
charactersrpc = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
async-trait = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
