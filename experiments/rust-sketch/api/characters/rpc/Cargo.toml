[package]
name = "charactersrpc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The characters module's pure, transport-free capability contract (port of Go's
# api/characters/charactersapi): the Ownership / Player / Admin traits. `#[rpc]` is
# applied to Ownership + Player to GENERATE the transport glue (Client /
# register_server / operations) into child `*_rpc` modules — the debt the project
# forbids hand-writing. A consumer that needs `dyn Ownership` (inventory, Step 9)
# imports THIS crate to name the trait (rule 4's conscious nominal-typing cost),
# never the `characters` impl crate.
[dependencies]
opsapi = { workspace = true }
adminapi = { workspace = true }
edge = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
futures = { workspace = true }
