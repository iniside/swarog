[package]
name = "edge-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

# Detaches this crate from the parent GameBackend workspace: cargo-fuzz needs
# nightly + libfuzzer-sys's unstable sanitizer coverage instrumentation, neither of
# which the stable workspace build should ever pull in. (Port of Go's
# `edge/fuzz_test.go` targets.)
[workspace]

[dependencies]
libfuzzer-sys = "0.4"
tokio = { version = "1", features = ["rt"] }

[dependencies.edge]
path = ".."

[[bin]]
name = "frame_decode"
path = "fuzz_targets/frame_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "wire_decode"
path = "fuzz_targets/wire_decode.rs"
test = false
doc = false
bench = false
