[package]
name = "gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
lifecycle = { workspace = true }
registry = { workspace = true }
opsapi = { workspace = true }
# The accounts CONTRACT crate (rule 4 / the dependency law: contract crates of any
# domain are importable by a module) — names `dyn Sessions` for the verifier
# adapter. NEVER the accounts impl crate, never accountsrpc (archcheck enforces).
accountsapi = { workspace = true }
edge = { workspace = true }
contrib = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
tower = { version = "0.5", features = ["util"] }
futures = { workspace = true }
