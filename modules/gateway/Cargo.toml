[package]
name = "gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
lifecycle = { workspace = true }
registry = { workspace = true }
opsapi = { workspace = true }
# The accounts CONTRACT crate (rule 4 / the dependency law: contract crates of any
# domain are importable by a module) — names `dyn Sessions` for the verifier
# adapter. NEVER the accounts impl crate, never accountsrpc (archcheck enforces).
accountsapi = { workspace = true }
# The apikeys CONTRACT crate (same rule) — names `dyn Keys` for the key-verifier
# adapter. NEVER the apikeys impl crate, never apikeysrpc (archcheck enforces).
apikeysapi = { workspace = true }
# Convention-conformance contract types: this crate exposes `conformance::entry()`
# (always compiled, the asyncevents::testing precedent) for the conformancecheck harness.
conformance = { workspace = true }
edge = { workspace = true }
contrib = { workspace = true }
# The shared route-pattern label seam (`httpmw::RoutePattern`): the front door stamps a
# matched op's route pattern onto the response so `core/metrics` labels op traffic by
# pattern instead of the fixed "unmatched". A core leaf (no cycle: httpmw imports no module).
httpmw = { workspace = true }
axum = { workspace = true }
# The HTTP reverse-proxy passthrough (Go's httpproxy): reqwest is the workspace client
# already used by accounts (Epic OIDC/OAuth); the `stream` feature streams the
# response body back (`bytes_stream`). The request body streams via `Body::wrap` (axum
# `Body` is an `http_body::Body`), no extra crate needed.
reqwest = { workspace = true, features = ["stream"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
tower = { version = "0.5", features = ["util"] }
futures = { workspace = true }
