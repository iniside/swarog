[package]
name = "config"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The config impl module (port of Go's modules/config): DB-backed operational
# knobs with LISTEN/NOTIFY live-reload. An impl crate — no OTHER module imports it;
# consumers use `configapi` (the reader trait) + `configevents` (the event).
[dependencies]
bus = { workspace = true }
lifecycle = { workspace = true }
registry = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
# Convention-conformance contract types: this crate exposes `conformance::entry()`
# (always compiled, the asyncevents::testing precedent) for the conformancecheck harness.
conformance = { workspace = true }
configapi = { workspace = true }
# config's OWN generated glue (rule 5: a module may import its own `<name>rpc`): the
# ConfigSnapshot `register_server` config exposes on the internal edge (Step 5).
configrpc = { workspace = true }
configevents = { workspace = true }
adminapi = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
# The durable plane under test (Step 7): config's write trigger appends `config.changed`
# via `asyncevents.append_event`, so the integration tests migrate the plane schema, and
# the writer-parity contract test drives `asyncevents::store::append` directly alongside
# the trigger (asyncevents is a core crate, not an api/ crate — no boundary violation).
asyncevents = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
