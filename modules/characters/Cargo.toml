[package]
name = "characters"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The characters impl module (port of Go's modules/characters): owns schema
# `characters`, provides the Ownership + Player capabilities, and emits
# Created/Deleted on the DURABLE plane atomic with the domain write. An impl crate —
# no OTHER module imports it; consumers use `charactersapi` (traits) +
# `charactersevents` (events). `charactersrpc` is its OWN glue (sanctioned): the
# edge register_server faces.
[dependencies]
bus = { workspace = true }
lifecycle = { workspace = true }
registry = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
charactersapi = { workspace = true }
charactersrpc = { workspace = true }
charactersevents = { workspace = true }
adminapi = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
asyncevents = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
