[package]
name = "rating"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The rating impl module (port of Go's modules/rating). Provides the wire-only
# `MmrReader` capability (registry + a QUIC edge face) and REACTS to `match.finished`
# (+15 winner / -15 loser). It owns schema `rating` (table `rating.ratings`) and upserts
# BOTH players inside the durable delivery transaction, so the projection commits
# atomically with the subscription checkpoint — a rating-svc restart no longer resets
# MMR. A process hosting rating needs a DB pool + the durable-events plane (app-owned).
# An impl crate — no OTHER module imports it; consumers use `ratingapi` (the trait);
# `ratingrpc` is its OWN glue (the edge face).
[dependencies]
bus = { workspace = true }
lifecycle = { workspace = true }
registry = { workspace = true }
edge = { workspace = true }
opsapi = { workspace = true }
ratingapi = { workspace = true }
ratingrpc = { workspace = true }
matchevents = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
