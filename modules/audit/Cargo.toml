[package]
name = "audit"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The audit impl module (port of Go's modules/audit): an append-only event ledger for
# GameOps. Owns schema `audit`, touches no other module's tables. It subscribes to the
# bus GENERICALLY by topic string via `bus::on_tx_raw` (raw JSON, no domain payload-type
# import — Go's zero-coupling design) and records each event on the HANDED inbox-dedup
# tx (exactly-once). A pure sink: no api crate; `auditrpc` is its OWN glue (re-exports
# `register_admin` for the admin fan-out edge face).
[dependencies]
bus = { workspace = true }
lifecycle = { workspace = true }
edge = { workspace = true }
opsapi = { workspace = true }
adminapi = { workspace = true }
auditrpc = { workspace = true }
# The scheduler event CONTRACT crate (sanctioned dependency — a contract, not an impl):
# audit subscribes to `scheduler.fired` by the descriptor's topic const so a rename can
# never drift the literal. It does NOT import the payload type into its handlers — the
# raw `on_tx_raw` still parses `name` out of the raw JSON (zero payload coupling).
schedulerevents = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
# The anti-drift test imports the producers' event contracts to diff the audited topic
# set against their declared topics — a rename on either side fails the build.
charactersevents = { workspace = true }
accountsevents = { workspace = true }
configevents = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
