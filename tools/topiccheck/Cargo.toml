[package]
name = "topiccheck"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# topiccheck (Step 14b): the Rust redesign of Go's whole-program topiccheck. Go used
# go/types object identity across one packages.Load to diff every `bus.Define`d topic
# against every `bus.On` site. Rust has no equivalent whole-program type analysis, so
# this instead builds the MONOLITH module set (the superset of every process) with a
# recording bus transport, runs the register+init lifecycle phases, and diffs the
# topics that were actually SUBSCRIBED against the ones the events crates DEFINE. It is
# a tool (not a module), so it may depend on every module + events crate — archcheck
# only constrains `modules/` consumers, and classifies `tools/` as Other (unconstrained).
[[bin]]
name = "topiccheck"
path = "src/main.rs"

[dependencies]
lifecycle = { workspace = true }
bus = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }

# The DEFINE sites — the canonical `bus::define` statics, referenced directly so a
# renamed/removed topic breaks THIS tool at compile time (the intended coupling).
accountsevents = { workspace = true }
charactersevents = { workspace = true }
configevents = { workspace = true }
matchevents = { workspace = true }
schedulerevents = { workspace = true }
adminevents = { workspace = true }

# The RPC-contract sources for the `contract-golden` subcommand (Step 6c): each api
# crate's generated `<snake>_rpc::route_bindings()` carries the impl-free Operation
# values (method/verb/path/auth/success/retry_mode) that go into the committed golden.
# Referenced directly (like the events crates above) so a renamed/removed trait breaks
# this tool at compile time; the hand-list is additionally self-checked against the
# `#[rpc]` traits actually present under api/*/api at runtime.
opsapi = { workspace = true }
accountsapi = { workspace = true }
adminapi = { workspace = true }
apikeysapi = { workspace = true }
charactersapi = { workspace = true }
configapi = { workspace = true }
inventoryapi = { workspace = true }
leaderboardapi = { workspace = true }
matchapi = { workspace = true }
ratingapi = { workspace = true }

# The SUBSCRIBE sites — the full monolith module set, single-sourced (Step 3,
# abstraction-leak closures) so this tool and requirecheck can't silently diverge on
# which modules they build. Instantiating and building them runs every real
# `on`/`on_tx`/`on_tx_raw` call.
checkmodules = { workspace = true }

[dev-dependencies]
# The golden_tests flatten_shape unit test derives serde::Serialize on a fixture with
# #[serde(rename)] to prove the flattener reads the serde WIRE key, not the Rust field
# name. Only the tests need the derive crate; the tool itself uses serde_json alone.
serde = { workspace = true }
