[package]
name = "admincheck"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# admincheck (admin extension points, Step 5): the extension-point contract
# validator, shaped exactly like `topiccheck`. It builds the MONOLITH and SPLIT
# module sets (via `checkmodules::DeploymentProfile`) with a lazy DB pool + no-op
# bus transport, runs the two no-I/O lifecycle phases (`register` → `init`), and
# reads `adminapi::SLOT` contributions to validate every contributed
# `ExtensionEntry` against the extension POINTS the page owners declare as consts.
# It is a tool (not a module), so it may depend on every api crate — archcheck only
# constrains `modules/` consumers and classifies `tools/` as Other (unconstrained).
[[bin]]
name = "admincheck"
path = "src/main.rs"

[dependencies]
lifecycle = { workspace = true }
bus = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }

# The extension VOCABULARY (ExtensionEntry/ExtensionKind/Present/ExtensionPoint) +
# the SLOT the portal reads.
adminapi = { workspace = true }

# The DECLARED points — the owner consts, referenced directly so a renamed/removed
# point breaks THIS tool at compile time (the intended coupling, like topiccheck's
# `defined_topics()`).
accountsapi = { workspace = true }
charactersapi = { workspace = true }

# The CONTRIBUTED entries — the full per-process module sets, single-sourced (the
# same source topiccheck/requirecheck build) so this tool can't diverge on which
# modules it observes. Building them runs every real `.with_extensions(..)` wiring.
checkmodules = { workspace = true }
