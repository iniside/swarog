[package]
name = "splitproof"
version = "0.1.0"
edition = "2021"
publish = false

# Cross-platform split-proof harness. Replaces split-proof.sh/.ps1: the fleet is
# spawned as child processes with a typed env map and a kill-on-drop guard (no shell,
# so no PowerShell arg-quoting / MSYS job-control / winctrl bugs), health-checked over
# reqwest, DB-asserted via sqlx, and the player QUIC front driven through the `edge`
# crate as a library. See docs/plans/2026-07-11-1730-rust-splitproof-harness-plan.md.

[dependencies]
edge = { path = "../../core/edge" }
processctl = { path = "../processctl" }
tokio = { workspace = true }
anyhow = { workspace = true }
sqlx = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["cookies"] }
# Recompute the apikeys secret hash (base64url(sha256(secret))) inside the [AD6]
# cross-process rich-form assertion, proving the show-once secret is exactly what the
# apikeys store persisted as `secret_hash` — must use the SAME encoding as
# modules/apikeys/src/store.rs::secret_hash (URL_SAFE_NO_PAD, NOT hex).
sha2 = { workspace = true }
base64 = { workspace = true }

# The fleet-liveness tests drive processctl's production spawn path, which on unix
# re-execs `current_exe --__processctl-guardian-v1`; only a `harness = false`
# target can dispatch that guardian before the tests run (a libtest binary has no
# such early hook and exits 101 on the re-exec). Same shape as devctl's
# `supervised` fixture (Step 8b).
[[test]]
name = "fleet_liveness"
path = "tests/fleet_liveness.rs"
harness = false
