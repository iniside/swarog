[package]
name = "checkmodules"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# checkmodules (Step 3, abstraction-leak closures; per-process libs, Step 10):
# single-sources the module sets that `topiccheck` and `requirecheck` build to
# observe real subscribe/require call sites. It no longer builds module vecs
# itself — it imports the `cmd/*` composition-root LIBS (each exports
# `modules(&ProcessWiring, …)`, the exact list its `main.rs` boots) and exposes
# `DeploymentProfile::{Monolith, Split}` over them, so a module added to any
# `cmd/*` lib can't silently miss either harness's coverage. It is a tool (not a
# module), so it may depend on every `cmd/*` lib — archcheck classifies `tools/`
# as Other (unconstrained), with a derived exception for the `gateway` crate this
# transitively reaches through `cmd/gateway-svc`/`cmd/server` (see archcheck's
# `GATEWAY_CHECKER_HOSTS`).
[lib]
name = "checkmodules"
path = "src/lib.rs"

[dependencies]
lifecycle = { workspace = true }

server = { workspace = true }
gateway-svc = { workspace = true }
characters-svc = { workspace = true }
inventory-svc = { workspace = true }
config-svc = { workspace = true }
apikeys-svc = { workspace = true }
accounts-svc = { workspace = true }
admin-svc = { workspace = true }
audit-svc = { workspace = true }
scheduler-svc = { workspace = true }
match-svc = { workspace = true }
rating-svc = { workspace = true }
leaderboard-svc = { workspace = true }
