[package]
name = "checkmodules"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# checkmodules (Step 3, abstraction-leak closures): single-sources the monolith
# module set that both `topiccheck` and `requirecheck` build to observe real
# subscribe/require call sites. Before this crate, the identical 12-entry vec lived
# in both tools' main.rs; a 13th module added to `cmd/server` but missed in either
# copy would silently drop out of that harness's coverage. It is a tool (not a
# module), so it may depend on every module impl — archcheck classifies `tools/` as
# Other (unconstrained).
[lib]
name = "checkmodules"
path = "src/lib.rs"

[dependencies]
lifecycle = { workspace = true }

config = { workspace = true }
characters = { workspace = true }
inventory = { workspace = true }
accounts = { workspace = true }
admin = { workspace = true }
audit = { workspace = true }
scheduler = { workspace = true }
rating = { workspace = true }
match_module = { workspace = true }
leaderboard = { workspace = true }
apikeys = { workspace = true }
webui = { workspace = true }
gateway = { workspace = true }
