[package]
name = "processctl"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
rand.workspace = true

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Authorization",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
    "Win32_System_JobObjects",
    "Win32_System_IO",
    "Win32_System_Pipes",
    "Win32_System_Threading",
] }

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[dev-dependencies]
# Anti-drift ONLY: the fleet session budget mirrors these crates' exported session
# constants as plain `u32`s (no runtime dep — a tool must not pull the heavy plane/
# module crates into its shipping binary). This dev-dep edge lets the fleet_tests
# anti-drift test assert the mirrors still equal the real constants; archcheck ignores
# dev-dependencies, so no architectural edge is created.
asyncevents = { workspace = true }
invalidation = { workspace = true }
scheduler = { workspace = true }

[[test]]
name = "processctl-downstream"
path = "tests/downstream/src/main.rs"
harness = false

[[test]]
name = "processctl-lease-marker"
path = "tests/lease_marker/src/main.rs"
harness = false
