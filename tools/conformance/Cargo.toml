# conformancecheck (convention-conformance harness, plan 2026-07-12-0952): executes
# tool-owned policy for every module across the env-validation, input-cap,
# infra-outage and argon-parity conventions. Shipping modules expose only the
# minimal factual probes used below; they never depend on this tool's policy.
[package]
name = "conformancecheck"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "conformancecheck"
path = "src/main.rs"

[dependencies]
checkmodules = { workspace = true }
lifecycle = { workspace = true }
bus = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
rpc-contract-model = { workspace = true }
syn = { workspace = true }
# Only modules that expose factual probes are direct dependencies. The complete
# module inventory comes from checkmodules and the filesystem drift preflight.
accounts = { workspace = true }
admin = { workspace = true }
apikeys = { workspace = true }
apikeysapi = { workspace = true }
gateway = { workspace = true }
