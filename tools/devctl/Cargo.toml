[package]
name = "devctl"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
rand.workspace = true
processctl = { path = "../processctl" }
edgeca = { path = "../edgeca" }

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Authorization",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
    "Win32_System_Pipes",
    "Win32_System_Threading",
] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Supervised-child tests drive processctl's production spawn path, which on unix
# re-execs `current_exe --__processctl-guardian-v1`; only a `harness = false`
# target can dispatch that guardian before the tests run (a libtest binary has no
# such early hook and exits 101 on the re-exec). Same shape as processctl's
# downstream / lease_marker fixtures.
[[test]]
name = "supervised"
path = "tests/supervised.rs"
harness = false
