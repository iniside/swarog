[package]
name = "accountsrpc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The accounts domain's GENERATED transport glue (port of Go's
# api/accounts/accountsrpc + accountsauthrpc): the edge-dependent half of the
# `#[rpc]` codegen. It expands `accountsapi`'s metadata-callback macros through
# `rpc_macro::generate_glue` into `Client` / `register_server` / `provide_remote`
# per capability, plus the hand-written `remote_factories()` aggregator (the Step-4
# generic-`remote` seam). Impl-tier: may import `edge`; reached ONLY by the
# `accounts` module itself (its own glue is sanctioned, rule 5), `remote`, and
# `cmd/*` — NEVER by a domain consumer (the gateway's verifier imports
# `accountsapi`, rule 4). Depends on `remote` only to NAME `remote::RemoteFactory`;
# acyclic because `core/remote` imports no glue crate.
[dependencies]
accountsapi = { workspace = true }
# Cross-cutting admin fan-out glue, re-exported (`register_admin`) so the accounts
# module reaches it through its OWN rpc crate (archcheck-clean).
adminrpc = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
registry = { workspace = true }
lifecycle = { workspace = true }
remote = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
