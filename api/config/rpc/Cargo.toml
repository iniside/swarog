[package]
name = "configrpc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The config domain's GENERATED transport glue (Step 5): the edge-dependent half of
# the `#[rpc]` codegen for `configapi::ConfigSnapshot`, split out of the pure
# `configapi` contract. It expands `configapi`'s metadata-callback macro through
# `rpc_macro::generate_glue` into `Client` / `register_server` / `provide_remote`,
# and hosts the hand-written `CachedConfig` adapter + `remote_factories()` aggregator
# (the Step-4 generic-`remote` seam). Impl-tier: may import `edge`; reached ONLY by
# the `config` module itself (its own glue is sanctioned, rule 5), `remote`, and
# `cmd/*` — NEVER by a domain consumer (they import `configapi`, rule 4). Depends on
# `remote` only to NAME `remote::{RemoteFactory, RemoteBoot, BOOT_SLOT}`; acyclic
# because `core/remote` imports no glue crate.
[dependencies]
configapi = { workspace = true }
# Cross-cutting admin fan-out glue, re-exported (`register_admin`) so the config
# module reaches it through its OWN rpc crate (archcheck-clean).
adminrpc = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
registry = { workspace = true }
lifecycle = { workspace = true }
remote = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
# The CachedConfig revision-gate unit test drives `refresh` against a fake snapshot.
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
