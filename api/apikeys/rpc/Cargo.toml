[package]
name = "apikeysrpc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The apikeys domain's GENERATED transport glue: the edge-dependent half of the
# `#[rpc]` codegen. It expands `apikeysapi`'s metadata-callback macro through
# `rpc_macro::generate_glue` into `Client` / `register_server` / `provide_remote` for
# the Keys capability, plus the hand-written `remote_factories()` aggregator (the
# generic-`remote` seam). Impl-tier: may import `edge`; reached ONLY by the `apikeys`
# module itself (its own glue is sanctioned, rule 5), `remote`, and `cmd/*` — NEVER by
# a domain consumer (the gateway's key verifier imports `apikeysapi`, rule 4). Depends
# on `remote` only to NAME `remote::RemoteFactory`; acyclic because `core/remote`
# imports no glue crate.
[dependencies]
apikeysapi = { workspace = true }
# Cross-cutting admin fan-out glue, re-exported (`register_admin`) so the apikeys
# module reaches it through its OWN rpc crate (archcheck-clean).
adminrpc = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
registry = { workspace = true }
lifecycle = { workspace = true }
remote = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
