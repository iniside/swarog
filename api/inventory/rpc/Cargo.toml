[package]
name = "inventoryrpc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The inventory domain's GENERATED transport glue (port of Go's
# api/inventory/inventoryrpc): the edge-dependent half of the `#[rpc]` codegen. It
# expands `inventoryapi`'s metadata-callback macro through
# `rpc_macro::generate_glue` into `Client` / `register_server` / `provide_remote`,
# plus the hand-written `remote_factories()` aggregator (the Step-4 generic-`remote`
# seam). Impl-tier: may import `edge`; reached ONLY by the `inventory` module itself
# (its own glue is sanctioned), `remote`, and `cmd/*` — NEVER by a domain consumer
# (they import `inventoryapi`, rule 4). Depends on `remote` only to NAME
# `remote::RemoteFactory` (the return type of `remote_factories()`); acyclic because
# `core/remote` imports no glue crate.
[dependencies]
inventoryapi = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
registry = { workspace = true }
lifecycle = { workspace = true }
remote = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
