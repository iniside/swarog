[package]
name = "charactersapi"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The characters module's PURE, transport-free capability contract (port of Go's
# api/characters/charactersapi): the Ownership / Player / Admin traits + the
# Character wire type. `#[rpc]` generates the transport-FREE surface (wire
# envelopes, METHOD_* consts, operations()/route_bindings()) into child `*_rpc`
# modules, plus a metadata-callback macro the sibling `charactersrpc` glue crate
# expands into the edge-dependent glue. NO `edge` dependency — a consumer that
# needs `dyn Ownership` (inventory) imports THIS crate to name the trait (rule 4's
# conscious nominal-typing cost), never the `characters` impl crate and never the
# glue crate.
[dependencies]
opsapi = { workspace = true }
adminapi = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
