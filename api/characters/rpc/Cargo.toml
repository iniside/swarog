[package]
name = "charactersrpc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# The characters domain's GENERATED transport glue (port of Go's
# api/characters/charactersrpc): the edge-dependent half of the `#[rpc]` codegen.
# It expands `charactersapi`'s metadata-callback macros through
# `rpc_macro::generate_glue` into `Client` / `register_server` / `provide_remote`
# per capability, plus the hand-written `remote_factories()` aggregator (the Step-4
# generic-`remote` seam). Impl-tier: may import `edge`; reached ONLY by the
# `characters` module itself (its own glue is sanctioned), `remote`, and `cmd/*` —
# NEVER by a domain consumer (they import `charactersapi`, rule 4).
[dependencies]
charactersapi = { workspace = true }
opsapi = { workspace = true }
edge = { workspace = true }
registry = { workspace = true }
lifecycle = { workspace = true }
rpc-macro = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
